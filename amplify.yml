version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "========== DEBUG INFO =========="
        - echo "Current directory: $(pwd)"
        - echo "Directory structure:"
        - ls -la
        - echo "================================="
        # QUOTE command yang mengandung karakter ':'
        - "test -f frontend/index.html && echo 'index.html OK' || (echo 'index.html NOT FOUND' && exit 1)"
    build:
      commands:
        - echo "No build step required - static HTML"
    postBuild:
      commands:
        - echo "Build done"
        - ls -la frontend/
  artifacts:
    baseDirectory: frontend
    files:
      - "**/*"
  cache:
    paths: []